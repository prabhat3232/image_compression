{% if faqs %}
<section class="mt-12" aria-labelledby="faq-heading-{{ faq_id | default('main') }}">
  <h2 id="faq-heading-{{ faq_id | default('main') }}" class="text-2xl font-bold text-white mb-4">Frequently asked questions</h2>
  <dl class="space-y-4 text-slate-300">
    {% for item in faqs %}
    <div>
      <dt class="font-semibold text-white">{{ item.q }}</dt>
      <dd class="mt-1">{{ item.a }}</dd>
    </div>
    {% endfor %}
  </dl>
</section>
{% endif %}
