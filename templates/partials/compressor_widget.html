<div class="glass rounded-2xl p-6 md:p-8 my-8">
  <h2 class="text-xl font-bold text-white mb-4">Compress now</h2>
  <form id="{{ form_id }}" data-compress-widget enctype="multipart/form-data" class="space-y-4">
    <input type="file" name="file" accept="image/*" multiple required
      class="w-full text-sm text-slate-300 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:bg-primary-600 file:text-white">
    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
      <label class="block text-sm text-slate-300">Quality (1–100)
        <input type="range" name="quality" min="1" max="100" value="{{ preset_quality | default(75) }}"
          class="w-full accent-primary-500" oninput="this.nextElementSibling.textContent=this.value+'%'">
        <span class="text-primary-400 font-bold">{{ preset_quality | default(75) }}%</span>
      </label>
      <label class="block text-sm text-slate-300">Format
        <select name="format" class="w-full mt-1 bg-dark-800 border border-slate-600 rounded-lg px-3 py-2 text-white">
          <option value="jpg" {% if preset_format == 'jpg' %}selected{% endif %}>JPG</option>
          <option value="webp" {% if preset_format == 'webp' %}selected{% endif %}>WEBP</option>
          <option value="pdf" {% if preset_format == 'pdf' %}selected{% endif %}>PDF</option>
        </select>
      </label>
    </div>
    {% if preset_format == 'pdf' %}
    <label class="flex items-center gap-2 text-sm text-slate-300">
      <input type="checkbox" name="merge_pdf" class="accent-primary-500"> Merge all images into one PDF
    </label>
    <label class="flex items-center gap-2 text-sm text-slate-300">
      <input type="checkbox" name="compress_pdf_images" checked class="accent-primary-500"> Compress images in PDF
    </label>
    {% endif %}
    {% if show_strip_exif %}
    <label class="flex items-center gap-2 text-sm text-slate-300">
      <input type="checkbox" name="strip_exif" checked class="accent-primary-500"> Remove EXIF metadata
    </label>
    {% endif %}
    {% if resize_preset %}
    <input type="hidden" name="resize_preset" value="{{ resize_preset }}">
    {% endif %}
    <input type="text" name="website" tabindex="-1" autocomplete="off" class="hidden" aria-hidden="true">
    <button type="submit" class="w-full py-3 bg-primary-600 hover:bg-primary-500 text-white font-bold rounded-xl transition-colors">
      Start Compression
    </button>
    <p class="compress-status text-sm text-slate-400 min-h-[1.25rem]"></p>
  </form>
</div>
