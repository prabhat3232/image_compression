<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="google-adsense-account" content="ca-pub-3455511056651876">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3455511056651876" crossorigin="anonymous"></script>
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-MMQZPL0QW7"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag() { dataLayer.push(arguments); }
    gtag('js', new Date());
    gtag('config', 'G-MMQZPL0QW7');
  </script>
  {% block seo %}{% include 'partials/seo_head.html' %}{% endblock %}
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Outfit', 'sans-serif'] },
          colors: {
            primary: { 50: '#f0f9ff', 100: '#e0f2fe', 500: '#0ea5e9', 600: '#0284c7', 700: '#0369a1' },
            dark: { 900: '#0f172a', 800: '#1e293b', 700: '#334155' }
          }
        }
      }
    }
  </script>
  <style>
    .sr-only { position: absolute; width: 1px; height: 1px; padding: 0; margin: -1px; overflow: hidden; clip: rect(0,0,0,0); white-space: nowrap; border: 0; }
    .prose-content h2 { font-size: 1.5rem; font-weight: 700; color: #fff; margin-top: 2rem; margin-bottom: 1rem; }
    .prose-content h3 { font-size: 1.25rem; font-weight: 600; color: #e2e8f0; margin-top: 1.5rem; margin-bottom: 0.75rem; }
    .prose-content p { margin-bottom: 1rem; line-height: 1.7; color: #cbd5e1; }
    .prose-content ul, .prose-content ol { margin-bottom: 1rem; padding-left: 1.5rem; color: #cbd5e1; }
    .prose-content li { margin-bottom: 0.5rem; }
    .prose-content a { color: #38bdf8; }
    .prose-content a:hover { text-decoration: underline; }
  </style>
  {% block head_extra %}{% endblock %}
</head>
<body class="bg-dark-900 text-slate-200 min-h-screen font-sans antialiased">
  <div class="relative max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-12">
    {% include 'partials/nav.html' %}
    {% block content %}{% endblock %}
    {% include 'partials/footer.html' %}
    {% block ads_bottom %}{% endblock %}
  </div>
  {% block scripts %}{% endblock %}
</body>
</html>
